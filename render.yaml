services:
  - type: web
    name: formgen-web
    env: python
    buildCommand: |
      npm install
      npm run build
      pip install -r backend/requirements.txt
    startCommand: gunicorn app:app -w 1 --chdir backend
    region: oregon
    buildFilter:
      paths:
        - backend/**
        - src/**
        - public/**
        - package.json
        - render.yaml
